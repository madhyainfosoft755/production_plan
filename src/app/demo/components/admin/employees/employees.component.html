<p-breadcrumb [model]="breadcrumbItems"></p-breadcrumb>
<div class="card">
    <div class="grid">
        <div class="col-12">
            <div class="p-2 flex justify-content-between">
                <div class="flex align-items-center justify-content-between">
                    <p-button label="Add New" class="ml-2" icon="pi pi-plus" (onClick)="showAddEmployeeDialog()" />
                    <p-button (click)="exportExcel()" class="ml-2" [disabled]="(employeesData && employeesData.length === 0) || loadingED" title="Export CSV" icon="pi pi-file-excel" severity="success" ngClass="self-end" />
                </div>
                <span class="p-buttonset">
                    <p-button label="Active" (onClick)="showActiveEmployees()" [disabled]="current"/>
                    <p-button label="Blocked" (onClick)="showBlockedEmployees()" [disabled]="!current"/>
                </span>
            </div>
            <p-table [rowHover]="true"
            styleClass="p-datatable-gridlines p-datatable-sm p-datatable-striped" 
             [loading]="loadingED" [value]="employeesData" [tableStyle]="{ 'min-width': '50rem' }">
                <ng-template pTemplate="header">
                    <tr>
                        <th>SN</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Employee Id</th>
                        <th>Role</th>
                        <th>Added At</th>
                        <th>Action</th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-employee let-rowIndex="rowIndex">
                    <tr>
                        <td>{{ rowIndex+1 }}</td>
                        <td>{{ employee.salutation }}. {{ employee.name }}</td>
                        <td>{{ employee.email_add }}</td>
                        <td>{{ employee.emp_id }}</td>
                        <td>{{ employee.role }}</td>
                        <td>{{ employee.created_at.date | date:'dd-MM-yyyy' }}</td>
                        <td>
                            <p-button icon="pi pi-user-edit" size="small" (click)="editEmployee(employee)" />
                        </td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </div>
</div>
<p-dialog header="{{employee ? 'Update Employee' : 'Add Employee'}}" [modal]="true" [(visible)]="visibleAddEmployeeDialog" [style]="{ width: '75vw' }">
    <app-employee-details [employee]="employee" [incommingUserPermission]="employee?.permissions" [permissions]="permissions" *ngIf="visibleAddEmployeeDialog" (notifyParent)="onChildNotify($event)"></app-employee-details>
</p-dialog>
