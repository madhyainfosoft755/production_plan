<p-breadcrumb [model]="breadcrumbItems"></p-breadcrumb>
<div class="card">
    <div class="grid">
        <div class="col-12">

            <div class="grid">
            
                <div class="range-filter col-12 sm:col-3 ">
                    <p-calendar 
                        [(ngModel)]="rangeDates" 
                        (onSelect)="date_range_select($event)"
                        selectionMode="range" 
                        [readonlyInput]="true"
                        placeholder="Select From - To Date" />
                </div>
                <div class="month-filter col-12 sm:col-3 ">
                    <p-calendar 
                        (onSelect)="month_select($event)"
                        [(ngModel)]="month_full_year" 
                        view="month" 
                        dateFormat="mm/yy" 
                        [readonlyInput]="true"
                        placeholder="Select a Month" />
                </div>
                <div class="week-filter col-12 sm:col-3 ">
                    <p-dropdown 
                        [options]="weeks"
                        [(ngModel)]="selectedWeek"
                        optionLabel="name"
                        optionValue="value"
                        [filter]="true"
                        filterBy="name" 
                        [showClear]="false"
                        (onChange)="week_change($event)"
                        placeholder="Select a Week" />
                </div>
                <div class="range-filter col-12 sm:col-3 text-center flex justify-content-end align-items-center gap-2">
                    <p-button (click)="exportExcel()" class="mr-2" title="Export CSV" icon="pi pi-file-excel" severity="success" ngClass="self-end" />
                    <p-button icon="pi pi-times" severity="danger" (click)="get_all()" />
                </div>
            </div>
        </div>
        <div class="col-12">

            <p-table 
                *ngIf="pivotTable"
                [value]="rows" 
                [tableStyle]="{ 'min-width': '100%' }"
                class="p-datatable-sm p-datatable-striped p-datatable-gridlines"
                [loading]="loading_data"
                >
                <!-- Header -->
                <ng-template pTemplate="header">
                    <tr>
                    <th>Segment / Person</th>
                    <th *ngFor="let col of columns">{{ col }}</th>
                    <th class="total-col-header">Total (Row)</th>
                    </tr>
                </ng-template>

                <!-- Body -->
                <ng-template pTemplate="body" let-row>
                    <tr>
                    <td>{{ row }}</td>
                    <td *ngFor="let col of columns">
                        {{ data[row][col] || 0 }}
                    </td>
                    <td class="total-col">
                        {{ getRowTotal(row) }}
                    </td>
                    </tr>
                </ng-template>

                <!-- Footer -->
                <ng-template pTemplate="footer">
                    <tr class="total-row">
                    <td>Total (Column)</td>
                    <td *ngFor="let col of columns">
                        {{ getColumnTotal(col) }}
                    </td>
                    <td>{{ getGrandTotal() }}</td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    </div>
</div>
